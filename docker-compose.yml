# ============================================================================
# SINGLE-PC TESTING ONLY (2 apps on same machine)
# ============================================================================
#用途：在单台 PC 上测试 2 个 app（App A 和 App B）
# Untuk multi-PC federation (10 PC), gunakan:
#   output/<node_name>/docker-compose.yml
# ============================================================================

services:
  # RabbitMQ Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_broker
    hostname: rabbitmq
    networks:
      - chat_network
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # App Instance A
  app_a:
    build:
      context: ./A
      dockerfile: ../Dockerfile
    container_name: chat_app_a
    hostname: app_a
    networks:
      - chat_network
    volumes:
      - ./A:/app
      - ./A/chat.db:/app/chat.db
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - RABBITMQ_HOST=rabbitmq
    stdin_open: true
    tty: true
    command: >
      sh -c "pip install -r requirements.txt && 
             python sync_chatting_app.py"

  # App Instance B
  app_b:
    build:
      context: ./B
      dockerfile: ../Dockerfile
    container_name: chat_app_b
    hostname: app_b
    networks:
      - chat_network
    volumes:
      - ./B:/app
      - ./B/chat.db:/app/chat.db
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - RABBITMQ_HOST=rabbitmq
    stdin_open: true
    tty: true
    command: >
      sh -c "pip install -r requirements.txt && 
             python sync_chatting_app.py"

networks:
  chat_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
